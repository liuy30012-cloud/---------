# Nginx API reverse proxy template for CDN/WAF -> Nginx -> Spring Boot
# Replace the upstream address and trusted CDN ranges before production use.

upstream library_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

log_format api_combined
    '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" rt=$request_time '
    'u_ct=$upstream_connect_time u_rt=$upstream_response_time u_addr=$upstream_addr';

map $request_method $method_allowed {
    default 0;
    GET 1;
    POST 1;
    PUT 1;
    DELETE 1;
    OPTIONS 1;
    HEAD 1;
}

limit_req_zone $binary_remote_addr zone=api_per_ip:20m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=api_conn_per_ip:20m;

server {
    listen 80;
    server_name api.example.com;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    # Add your CDN/WAF CIDRs here, for example:
    # set_real_ip_from 203.0.113.0/24;

    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_header_buffer_size 8k;
    large_client_header_buffers 4 16k;

    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 20s;
    send_timeout 30s;

    server_tokens off;
    access_log /var/log/nginx/library-api-access.log api_combined;
    error_log /var/log/nginx/library-api-error.log warn;

    limit_req_status 429;
    limit_req_log_level warn;

    if ($method_allowed = 0) {
        return 405;
    }

    location / {
        limit_req zone=api_per_ip burst=60 nodelay;
        limit_conn api_conn_per_ip 30;

        proxy_http_version 1.1;
        proxy_pass http://library_backend;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
