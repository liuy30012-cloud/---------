version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: library-demo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: library_demo
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-demo-data:/var/lib/mysql
    restart: unless-stopped

  elasticsearch:
    build:
      context: ./docker/elasticsearch-ik
      dockerfile: Dockerfile
    image: library-demo-elasticsearch-ik:8.11.0
    container_name: library-demo-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-demo-data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  mysql-demo-data:
  elasticsearch-demo-data:
