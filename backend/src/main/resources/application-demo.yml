spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/library_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc.batch_size: 1000
        order_inserts: true
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

app:
  demo-books:
    enabled: true
    seed-if-empty-only: true
    resource: ${DEMO_BOOKS_RESOURCE:classpath:/demo/openlibrary-demo-books.csv.gz}
    chinese-showcase-resource: ${DEMO_BOOKS_CHINESE_SHOWCASE_RESOURCE:classpath:/demo/chinese-showcase-books.csv}
    target-count: ${DEMO_BOOKS_TARGET_COUNT:100000}
    disable-es-listener-during-seed: true

library:
  search:
    elasticsearch:
      enabled: ${ES_ENABLED:true}
      fallback-enabled: true
