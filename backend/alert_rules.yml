groups:
  - name: library_backend_alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job="library-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Library backend is down"
          description: "The library backend has been unreachable for more than 1 minute."

      - alert: HighHttp5xxRate
        expr: |
          sum(rate(http_server_requests_seconds_count{job="library-backend",status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_server_requests_seconds_count{job="library-backend"}[5m])), 1)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate"
          description: "More than 5% of backend requests have returned 5xx during the last 5 minutes."

      - alert: SecurityRateLimitSpike
        expr: sum(rate(library_security_rate_limit_blocked_total[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Application rate-limit blocks are spiking"
          description: "The backend is blocking more than 5 requests per second on average over 5 minutes."

      - alert: BotCooldownSpike
        expr: sum(rate(library_security_bot_cooldown_total[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Bot cooldowns are being activated frequently"
          description: "The anti-bot cooldown counter has stayed elevated for 10 minutes."

      - alert: HoneypotTriggered
        expr: increase(library_security_honeypot_total[10m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Honeypot endpoint was triggered"
          description: "A protected decoy endpoint was accessed in the last 10 minutes."

      - alert: CaptchaFailureSpike
        expr: |
          sum(rate(library_security_captcha_total{stage="verify",result=~"wrong-offset|invalid-trail|expired|context-mismatch"}[5m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Captcha verification failures are elevated"
          description: "Captcha verification failures have exceeded 3 per second on average over 5 minutes."

      - alert: HighMemoryUsage
        expr: |
          (jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap usage"
          description: "The JVM heap usage has remained above 85% for at least 5 minutes."
